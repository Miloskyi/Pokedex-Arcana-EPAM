receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # LangSmith / Arize Phoenix OTLP endpoint
  otlp/langsmith:
    endpoint: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    headers:
      x-api-key: ${LANGCHAIN_API_KEY}
  # Local debug logging
  logging:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/langsmith, logging]
